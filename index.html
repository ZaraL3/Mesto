    <!DOCTYPE html>
    <html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Место</title>
        <link rel="stylesheet" href="pages/index.css">
    </head>

    <body class="page">
        <div class="page__container">
            <header class="header">
                <img class="header__logo" src="image/logo.svg" alt="Место в России.">
            </header>
            <main class="content">
                <section class="profile">
                    <img src="image/avatar.jpg" alt="Жак-Ив Кусто" class="profile__avatar">
                    <div class="profile__info">
                        <h1 class="profile__title">Жак-Ив Кусто</h1>
                        <button type="button" class="profile__edit link" title="Редоктировать профиль"></button>
                        <p class="profile__subtitle">Исследователь океана</p>
                    </div>

                    <button class="profile__add" type="button"></button>
                </section>
                <!-- блок с картинками -->
                <section class="elements">
                    <ul class="elements__list"></ul>


                </section>
            </main>
            <footer class="footer">
                <p class="footer__text">&COPY; 2020 Mesto Russia</p>
            </footer>

            <!-- Кнопка редактирования профиля -->
            <div class="popup popup_reduction">
                <div class="popup__overlay"></div>
                <div class="popup__container">
                    <button class="popup__button-close" id="close-button-profile" type="button"></button>
                    <form class="popup__form popup-profile" name="edit-profile" id="form" novalidate>
                        <div class="popup__fieldset">
                            <h2 class="popup__title">Редактировать профиль</h2>
                            <div class="popup__fieldset">
                            <input class="popup__input  popup__input_type_name" name="title" id="popup__name"
                                type="text" placeholder="Имя" value="Жак-Ив Кусто" minlength="2" maxlength="40" contenteditable="true" required>
                                <span id="popup__name-error" class="popup__input-error">Минимальное кол-во символов 2, максимальное 40</span>
                                <input class="popup__input popup__input_type_job" name="subtitle" id="popup__description" type="text"
                                placeholder="О себе" value="Исследователь океана" minlength="2" maxlength="200" contenteditable="true" required>
                                <span id="popup__description-error" class="popup__input-error"></span>
                            </div>
                        </div>
                        <button class="popup__button-save popup__button-save-profile" id="save-profile" type="submit">Сохранить</button>
                    </form>
                </div>
            </div>
        
             <!-- Кнопка добавления карточки -->
            <div class = "popup popup_card-opened">
                <div class="popup__overlay"></div>
                <div class="popup__container">
                    <button class="popup__button-close link popup__button-close_type_add" id="button-close" type="button"></button>
                    <form class="popup__form popup__add" name="edit-profile" novalidate>
                        <h2 class="popup__title">Новое место</h2>
                        <div class="popup__fieldset">
                            <input id="card__name" class="popup__input popup__input_el_card-name" type="text"
                                name="card-name" placeholder="Название" minlength="2" maxlength="30" required>
                                <span id="card__name-error" class="popup__input-error">Минимальное кол-во символов 2, максимальное 30!</span>
                                <input id="card__link" class="popup__input popup__input_el_card-link" type="url"
                                name="card-link" placeholder="Ссылка на картинку" required>
                                <span id="card__link-error" class="popup__input-error"> </span>
                        </div>
                        <button class="popup__button-save popup__button-save-card" type="submit">Создать</button>
                    </form>
                </div>
            </div>
    

        <!-- Попап с открывающейся картинкой  -->
            <div class="popup popup_open-picture popup_viewer">
                <div class="popup__overlay"></div>
                <div class="popup__container-picture">
                    <button type="button" class="popup__button-close link" id="close-button-picture"></button>
                    <img class="popup__picture" src="#" alt="Картинка">
                    <h3 class="popup__description" type="text" name="name"></h3>
                </div>
            </div>
        </div>

            <!--Начало блока с template элементами - карточки -->
            <template id="card-template">
                <li class="card">
                <button type="button" class="card__button-delete link"></button>
                <img src="#" alt="Картинка" class="card__image">
                <div class="card__info">
                    <h2 class="card__name"></h2>
                        <div class="card__like">
                        <button type="button" class="card__button-like link"></button>
                    </div>
                </div>
                </li>
            </template>
            
        <script defer src="scripts/index1.js"></script>
        <script defer src="scripts/formvalide11.js"></script>
    </body>
</html>
