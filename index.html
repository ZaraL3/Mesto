<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <link rel="stylesheet" href="pages/index.css">
</head>

<body class="page">
    <div class="page__container">
        <header class="header">
            <img class="header__logo" src="image/logo.svg" alt="Место в России.">
        </header>
        <main class="content">
            <section class="profile">
                <img src="image/avatar.jpg" alt="Жак-Ив Кусто" class="profile__avatar">
                <div class="profile__info">
                    <h1 class="profile__title">Жак-Ив Кусто</h1>
                    <button type="button" class="profile__edit link" title="Редоктировать профиль"></button>
                    <p class="profile__subtitle">Исследователь океана</p>
                </div>

                <button class="profile__add" type="button"></button>
            </section>
            <section class="elements">
                <div class="elements__list">
                    <li class="elements__list-item">
                        <img src="image/karachaevsk.jpg" alt="Карачаевск" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Карачаево-Черкессия</h2>
                            <button type="button" class="elements__like"></button>
                        </div>
                    </li>
                    <li class="elements__list-item">
                        <img src="image/elbrus.jpg" alt="Гора Эльбрус" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Гора Эльбрус</h2>
                            <button type="button" class="elements__like"></button>
                        </div>
                    </li>
                    <li class="elements__list-item">
                        <img src="image/dombai.jpg" alt="Домбай" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Домбай</h2>
                            <button type="button" class="elements__like"></button>
                        </div>
                    </li>
                    <li class="elements__list-item">
                        <img src="image/pinzolo.jpg" alt="Пинцоло" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Пинцоло</h2>
                            <div class="elements__like-container">
                                <button type="button" class="elements__like"></button>
                            </div>
                        </div>
                    </li>
                    <li class="elements__list-item">
                        <img src="image/california.jpg" alt="Калифорния" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Калифорния</h2>
                            <button type="button" class="elements__like"></button>
                        </div>
                    </li>
                    <li class="elements__list-item">
                        <img src="image/seealpsee.jpg" alt="Озеро Зееальп" class="elements__image">
                        <button class="elements__delete" type="button"></button>
                        <div class="elements__container">
                            <h2 class="elements__text">Озеро Зееальп</h2>
                            <button type="button" class="elements__like"></button>
                        </div>
                    </li>
                </div>
            </section>
        </main>
        <footer class="footer">
            <p class="footer__text">&COPY; 2020 Mesto Russia</p>
        </footer>

        <!-- Кнопка редактирования профиля -->
        <div class="popup popup_reduction">
            <div class="popup__container">
                <button class="popup__button-close link" type="button"></button>
                <form class="popup__form" name="edit-profile" novalidate>
                    <h2 class="popup__title">Редактировать профиль</h2>
                    <div class="popup__fieldset">
                        <input class="popup__input popup__input_type_name" name="title" id="popup__name-input"
                            type="text" placeholder="Имя" value="Жак-Ив Кусто">
                        <input class="popup__input popup__input_type_job" name="subtitle" id="job-lable" type="text"
                            placeholder="О себе" value="Исследователь океана">
                    </div>
                    <button class="popup__button-save link" type="submit">Сохранить</button>
                </form>
            </div>
        </div>

        <!-- Кнопка добавления карточки -->
        <div class="popup popup__container_card" >
            <div class="popup__container "  >
                <button class="popup__button-close link" type="button"></button>
                <form class="popup__form" name="edit-profile" novalidate>
                    <h2 class="popup__title">Новое место</h2>
                    <div class="popup__fieldset">
                        <input id="card-name-label" class="popup__input popup__input_el_card-name" type="text"
                            name="card-name" placeholder="Название"  required>
                        <input id="card-link-label" class="popup__input popup__input_el_card-link" type="url"
                            name="card-link" placeholder="Ссылка на картинку" required>
                    </div>
                    <button class="popup__button-save link" type="submit">Создать</button>
                </form>
            </div>
        </div>
 

       <!-- Попап с отклывающейся картинкой  -->
        <div class="popup popup_open-picture">
            <div class="popup__container popup__container_picture">
                <button type="button" class="popup__button-close link"></button>
                <img class="popup__picture" src="#" alt="Картинка">
                <h3 class="popup__description" type="text" name="name"></h3>
            </div>
        </div>
    </div>
        <!--Начало блока с template элементами-->
        <template id="card-template">
            <li class="card">
              <button type="button" class="card__button-delete link"></button>
              <img src="#" alt="Картинка" class="card__image">
              <div class="card__info">
                <h2 class="card__name"></h2>
                    <div class="card__like">
                      <button type="button" class="card__button-like link"></button>
                      <p class="card__like_counter">0</p>
                  </div>
              </div>
            </li>
          </template>
          
    <script defer src="scripts/index.js"></script>
    
</body>

</html>
